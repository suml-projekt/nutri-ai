name: MLOps E2E Deployment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_VAR_streamlit_image_tag: ${{ github.sha }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  provision-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Login with Credentials
        if: env.AZURE_CLIENT_ID == ''
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve Azure Subscription
        run: |
          subscription_id="$(az account show --query id -o tsv)"
          echo "AZURE_SUBSCRIPTION_ID=$subscription_id" >> "$GITHUB_ENV"
          echo "TF_VAR_subscription_id=$subscription_id" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-suml-tfstate" \
            -backend-config="storage_account_name=sasumlprojektstudia" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=prod.terraform.tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_cli=true"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Provision Base Infrastructure
        working-directory: terraform
        run: terraform apply -auto-approve -var="deploy_streamlit_app=false"

      - name: Log in to Azure Container Registry
        run: az acr login --name acrsumlprojektstudia

      - name: Build Streamlit Image
        run: docker build -t acrsumlprojektstudia.azurecr.io/streamlit-app:${{ github.sha }} .

      - name: Push Streamlit Image
        run: docker push acrsumlprojektstudia.azurecr.io/streamlit-app:${{ github.sha }}

      - name: Deploy Streamlit Revision
        working-directory: terraform
        run: terraform apply -auto-approve -var="deploy_streamlit_app=true"
