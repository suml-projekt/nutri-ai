services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - LLM_URL=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    environment:
      - OLLAMA_KEEP_ALIVE=0
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  ollama_data: